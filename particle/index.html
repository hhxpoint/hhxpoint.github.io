<!DOCTYPE html>
<html lang="cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D粒子交互系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
<pre><code>    body &#123;
        background: #000;
        overflow: hidden;
        font-family: &#39;Segoe UI&#39;, Arial, sans-serif;
        color: white;
    &#125;
    
    #canvas-container &#123;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
    &#125;
    
    /* 控制面板 */
    #controls &#123;
        position: fixed;
        bottom: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 200, 100, 0.3);
        border-radius: 15px;
        padding: 20px;
        z-index: 1000;
        min-width: 300px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    &#125;
    
    .control-group &#123;
        margin-bottom: 15px;
    &#125;
    
    .control-group label &#123;
        display: block;
        margin-bottom: 8px;
        color: rgba(255, 220, 180, 0.9);
        font-size: 14px;
        font-weight: 500;
    &#125;
    
    .control-group input[type=&quot;range&quot;] &#123;
        width: 100%;
        height: 6px;
        background: rgba(255, 180, 100, 0.2);
        border-radius: 3px;
        outline: none;
        -webkit-appearance: none;
    &#125;
    
    .control-group input[type=&quot;range&quot;]::-webkit-slider-thumb &#123;
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        background: linear-gradient(135deg, #FFD700, #FFA500);
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 2px 10px rgba(255, 180, 100, 0.5);
    &#125;
    
    .control-group button &#123;
        background: linear-gradient(135deg, rgba(255, 180, 100, 0.3), rgba(255, 150, 80, 0.2));
        border: 1px solid rgba(255, 200, 100, 0.4);
        color: rgba(255, 220, 180, 0.9);
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        margin-right: 10px;
        margin-bottom: 10px;
        transition: all 0.3s ease;
    &#125;
    
    .control-group button:hover &#123;
        background: linear-gradient(135deg, rgba(255, 180, 100, 0.5), rgba(255, 150, 80, 0.4));
        transform: translateY(-2px);
    &#125;
    
    /* 标题 */
    #title &#123;
        position: fixed;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 36px;
        font-weight: 700;
        color: rgba(255, 220, 180, 0.9);
        text-shadow: 0 0 30px rgba(255, 180, 100, 0.5);
        z-index: 1000;
        text-align: center;
        pointer-events: none;
    &#125;
    
    /* 加载状态 */
    #loading &#123;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 2000;
        background: rgba(0, 0, 0, 0.9);
        padding: 40px;
        border-radius: 20px;
        border: 1px solid rgba(255, 200, 100, 0.3);
    &#125;
    
    .spinner &#123;
        width: 50px;
        height: 50px;
        border: 3px solid rgba(255, 180, 100, 0.3);
        border-radius: 50%;
        border-top-color: #FFD700;
        animation: spin 1s ease-in-out infinite;
        margin: 0 auto 20px;
    &#125;
    
    @keyframes spin &#123;
        to &#123; transform: rotate(360deg); &#125;
    &#125;
    
    /* 状态信息 */
    #info &#123;
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 200, 100, 0.3);
        border-radius: 15px;
        padding: 20px;
        z-index: 1000;
        max-width: 300px;
    &#125;
    
    #info h3 &#123;
        color: rgba(255, 210, 150, 0.9);
        margin-bottom: 15px;
        font-size: 18px;
    &#125;
    
    #info p &#123;
        color: rgba(255, 235, 215, 0.8);
        font-size: 14px;
        line-height: 1.5;
        margin-bottom: 10px;
    &#125;
    
    #info ul &#123;
        color: rgba(255, 220, 180, 0.7);
        font-size: 13px;
        padding-left: 20px;
    &#125;
    
    #info li &#123;
        margin-bottom: 5px;
    &#125;
&lt;/style&gt;
</code></pre>
</head>
<body>
    <div id="title">3D粒子交互系统</div>
    
<pre><code>&lt;div id=&quot;canvas-container&quot;&gt;&lt;/div&gt;

&lt;div id=&quot;controls&quot;&gt;
    &lt;div class=&quot;control-group&quot;&gt;
        &lt;label for=&quot;particle-count&quot;&gt;粒子数量: 50000&lt;/label&gt;
        &lt;input type=&quot;range&quot; id=&quot;particle-count&quot; min=&quot;1000&quot; max=&quot;200000&quot; value=&quot;50000&quot;&gt;
    &lt;/div&gt;
    &lt;div class=&quot;control-group&quot;&gt;
        &lt;label for=&quot;particle-size&quot;&gt;粒子大小: 2.0&lt;/label&gt;
        &lt;input type=&quot;range&quot; id=&quot;particle-size&quot; min=&quot;0.5&quot; max=&quot;5&quot; step=&quot;0.1&quot; value=&quot;2&quot;&gt;
    &lt;/div&gt;
    &lt;div class=&quot;control-group&quot;&gt;
        &lt;label for=&quot;rotation-speed&quot;&gt;旋转速度: 0.5&lt;/label&gt;
        &lt;input type=&quot;range&quot; id=&quot;rotation-speed&quot; min=&quot;0&quot; max=&quot;2&quot; step=&quot;0.1&quot; value=&quot;0.5&quot;&gt;
    &lt;/div&gt;
    &lt;div class=&quot;control-group&quot;&gt;
        &lt;label for=&quot;bloom-intensity&quot;&gt;泛光强度: 0.5&lt;/label&gt;
        &lt;input type=&quot;range&quot; id=&quot;bloom-intensity&quot; min=&quot;0&quot; max=&quot;1&quot; step=&quot;0.1&quot; value=&quot;0.5&quot;&gt;
    &lt;/div&gt;
    &lt;div class=&quot;control-group&quot;&gt;
        &lt;button id=&quot;reset-view&quot;&gt;重置视角&lt;/button&gt;
        &lt;button id=&quot;toggle-rotation&quot;&gt;暂停旋转&lt;/button&gt;
        &lt;button id=&quot;fullscreen&quot;&gt;全屏模式&lt;/button&gt;
    &lt;/div&gt;
&lt;/div&gt;

&lt;div id=&quot;info&quot;&gt;
    &lt;h3&gt;3D粒子交互系统&lt;/h3&gt;
    &lt;p&gt;金色粒子云，支持鼠标控制&lt;/p&gt;
    &lt;ul&gt;
        &lt;li&gt;旋转：鼠标左键拖拽&lt;/li&gt;
        &lt;li&gt;缩放：鼠标滚轮&lt;/li&gt;
        &lt;li&gt;平移：鼠标右键拖拽&lt;/li&gt;
        &lt;li&gt;重置：点击&quot;重置视角&quot;&lt;/li&gt;
        &lt;li&gt;全屏：点击&quot;全屏模式&quot;&lt;/li&gt;
    &lt;/ul&gt;
&lt;/div&gt;

&lt;div id=&quot;loading&quot;&gt;
    &lt;div class=&quot;spinner&quot;&gt;&lt;/div&gt;
    &lt;p&gt;正在加载3D粒子系统...&lt;/p&gt;
    &lt;p style=&quot;font-size: 12px; color: #888; margin-top: 10px;&quot;&gt;首次加载可能需要一些时间&lt;/p&gt;
&lt;/div&gt;

&lt;!-- 引入Three.js --&gt;
&lt;script src=&quot;https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js&quot;&gt;&lt;/script&gt;

&lt;script&gt;
    // 粒子系统类
    class GoldenParticleSystem &#123;
        constructor() &#123;
            this.scene = null;
            this.camera = null;
            this.renderer = null;
            this.particles = null;
            this.particleCount = 50000;
            this.rotationSpeed = 0.001;
            this.isRotating = true;
            this.clock = new THREE.Clock();
            
            this.mouse = new THREE.Vector2();
            this.raycaster = new THREE.Raycaster();
            this.isDragging = false;
            this.previousMousePosition = &#123; x: 0, y: 0 &#125;;
            
            this.cameraDistance = 50;
            this.cameraRotation = &#123; x: 0, y: 0 &#125;;
            
            this.init();
        &#125;
        
        init() &#123;
            try &#123;
                // 场景
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x000000);
                
                // 相机
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.camera.position.z = this.cameraDistance;
                
                // 渲染器
                this.renderer = new THREE.WebGLRenderer(&#123; antialias: true, alpha: true &#125;);
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                document.getElementById(&#39;canvas-container&#39;).appendChild(this.renderer.domElement);
                
                // 灯光
                const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
                this.scene.add(ambientLight);
                
                const pointLight1 = new THREE.PointLight(0xFFD700, 1, 100);
                pointLight1.position.set(50, 50, 50);
                this.scene.add(pointLight1);
                
                const pointLight2 = new THREE.PointLight(0xFF8C00, 1, 100);
                pointLight2.position.set(-50, -50, 50);
                this.scene.add(pointLight2);
                
                // 创建粒子
                this.createParticles();
                
                // 事件监听
                this.setupEventListeners();
                
                // 控制面板
                this.setupControls();
                
                // 隐藏加载状态
                this.hideLoading();
                
                // 开始动画
                this.animate();
                
            &#125; catch (error) &#123;
                console.error(&#39;初始化失败:&#39;, error);
                this.showError(&#39;初始化失败: &#39; + error.message);
            &#125;
        &#125;
        
        createParticles() &#123;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(this.particleCount * 3);
            const colors = new Float32Array(this.particleCount * 3);
            
            for (let i = 0; i &lt; this.particleCount; i++) &#123;
                const i3 = i * 3;
                
                // 球形分布
                const radius = 20 + Math.random() * 30;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i3 + 2] = radius * Math.cos(phi);
                
                // 金色到橙色渐变
                const hue = 0.1 + Math.random() * 0.1; // 金色到橙色
                const saturation = 0.8;
                const lightness = 0.5 + Math.random() * 0.3;
                
                const color = new THREE.Color();
                color.setHSL(hue, saturation, lightness);
                colors[i3] = color.r;
                colors[i3 + 1] = color.g;
                colors[i3 + 2] = color.b;
            &#125;
            
            geometry.setAttribute(&#39;position&#39;, new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute(&#39;color&#39;, new THREE.BufferAttribute(colors, 3));
            
            // 创建粒子纹理
            const canvas = document.createElement(&#39;canvas&#39;);
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext(&#39;2d&#39;);
            
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, &#39;rgba(255, 255, 255, 1)&#39;);
            gradient.addColorStop(0.3, &#39;rgba(255, 200, 100, 0.8)&#39;);
            gradient.addColorStop(0.7, &#39;rgba(255, 150, 50, 0.3)&#39;);
            gradient.addColorStop(1, &#39;rgba(255, 100, 0, 0)&#39;);
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            
            const texture = new THREE.CanvasTexture(canvas);
            
            const material = new THREE.PointsMaterial(&#123;
                size: 2,
                map: texture,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                vertexColors: true
            &#125;);
            
            this.particles = new THREE.Points(geometry, material);
            this.scene.add(this.particles);
        &#125;
        
        setupEventListeners() &#123;
            // 鼠标控制
            this.renderer.domElement.addEventListener(&#39;mousedown&#39;, (e) =&gt; this.onMouseDown(e));
            this.renderer.domElement.addEventListener(&#39;mousemove&#39;, (e) =&gt; this.onMouseMove(e));
            this.renderer.domElement.addEventListener(&#39;mouseup&#39;, () =&gt; this.onMouseUp());
            this.renderer.domElement.addEventListener(&#39;wheel&#39;, (e) =&gt; this.onMouseWheel(e));
            this.renderer.domElement.addEventListener(&#39;contextmenu&#39;, (e) =&gt; e.preventDefault());
            
            // 触摸控制
            this.renderer.domElement.addEventListener(&#39;touchstart&#39;, (e) =&gt; this.onTouchStart(e));
            this.renderer.domElement.addEventListener(&#39;touchmove&#39;, (e) =&gt; this.onTouchMove(e));
            this.renderer.domElement.addEventListener(&#39;touchend&#39;, () =&gt; this.onTouchEnd());
            
            // 窗口大小改变
            window.addEventListener(&#39;resize&#39;, () =&gt; this.onWindowResize());
            
            // 键盘控制
            window.addEventListener(&#39;keydown&#39;, (e) =&gt; this.onKeyDown(e));
        &#125;
        
        setupControls() &#123;
            // 粒子数量
            document.getElementById(&#39;particle-count&#39;).addEventListener(&#39;input&#39;, (e) =&gt; &#123;
                this.particleCount = parseInt(e.target.value);
                e.target.previousElementSibling.textContent = `粒子数量: $&#123;this.particleCount&#125;`;
                this.recreateParticles();
            &#125;);
            
            // 粒子大小
            document.getElementById(&#39;particle-size&#39;).addEventListener(&#39;input&#39;, (e) =&gt; &#123;
                const size = parseFloat(e.target.value);
                e.target.previousElementSibling.textContent = `粒子大小: $&#123;size.toFixed(1)&#125;`;
                if (this.particles) &#123;
                    this.particles.material.size = size;
                &#125;
            &#125;);
            
            // 旋转速度
            document.getElementById(&#39;rotation-speed&#39;).addEventListener(&#39;input&#39;, (e) =&gt; &#123;
                this.rotationSpeed = parseFloat(e.target.value) * 0.002;
                e.target.previousElementSibling.textContent = `旋转速度: $&#123;parseFloat(e.target.value).toFixed(1)&#125;`;
            &#125;);
            
            // 泛光强度
            document.getElementById(&#39;bloom-intensity&#39;).addEventListener(&#39;input&#39;, (e) =&gt; &#123;
                const intensity = parseFloat(e.target.value);
                e.target.previousElementSibling.textContent = `泛光强度: $&#123;intensity.toFixed(1)&#125;`;
                // 这里可以添加泛光效果的实现
            &#125;);
            
            // 重置视角
            document.getElementById(&#39;reset-view&#39;).addEventListener(&#39;click&#39;, () =&gt; &#123;
                this.cameraDistance = 50;
                this.cameraRotation = &#123; x: 0, y: 0 &#125;;
                this.updateCameraPosition();
            &#125;);
            
            // 暂停/继续旋转
            document.getElementById(&#39;toggle-rotation&#39;).addEventListener(&#39;click&#39;, (e) =&gt; &#123;
                this.isRotating = !this.isRotating;
                e.target.textContent = this.isRotating ? &#39;暂停旋转&#39; : &#39;继续旋转&#39;;
            &#125;);
            
            // 全屏
            document.getElementById(&#39;fullscreen&#39;).addEventListener(&#39;click&#39;, () =&gt; &#123;
                if (!document.fullscreenElement) &#123;
                    document.documentElement.requestFullscreen();
                &#125; else &#123;
                    document.exitFullscreen();
                &#125;
            &#125;);
        &#125;
        
        recreateParticles() &#123;
            if (this.particles) &#123;
                this.scene.remove(this.particles);
                this.particles.geometry.dispose();
                this.particles.material.dispose();
            &#125;
            this.createParticles();
        &#125;
        
        onMouseDown(event) &#123;
            if (event.button === 0) &#123; // 左键
                this.isDragging = true;
                this.previousMousePosition = &#123; x: event.clientX, y: event.clientY &#125;;
            &#125;
        &#125;
        
        onMouseMove(event) &#123;
            if (!this.isDragging) return;
            
            const deltaX = event.clientX - this.previousMousePosition.x;
            const deltaY = event.clientY - this.previousMousePosition.y;
            
            this.cameraRotation.y += deltaX * 0.005;
            this.cameraRotation.x += deltaY * 0.005;
            
            this.updateCameraPosition();
            
            this.previousMousePosition = &#123; x: event.clientX, y: event.clientY &#125;;
        &#125;
        
        onMouseUp() &#123;
            this.isDragging = false;
        &#125;
        
        onMouseWheel(event) &#123;
            event.preventDefault();
            this.cameraDistance += event.deltaY * 0.05;
            this.cameraDistance = Math.max(10, Math.min(200, this.cameraDistance));
            this.updateCameraPosition();
        &#125;
        
        onTouchStart(event) &#123;
            if (event.touches.length === 1) &#123;
                this.isDragging = true;
                this.previousMousePosition = &#123; 
                    x: event.touches[0].clientX, 
                    y: event.touches[0].clientY 
                &#125;;
            &#125;
        &#125;
        
        onTouchMove(event) &#123;
            if (!this.isDragging || event.touches.length !== 1) return;
            event.preventDefault();
            
            const deltaX = event.touches[0].clientX - this.previousMousePosition.x;
            const deltaY = event.touches[0].clientY - this.previousMousePosition.y;
            
            this.cameraRotation.y += deltaX * 0.005;
            this.cameraRotation.x += deltaY * 0.005;
            
            this.updateCameraPosition();
            
            this.previousMousePosition = &#123; 
                x: event.touches[0].clientX, 
                y: event.touches[0].clientY 
            &#125;;
        &#125;
        
        onTouchEnd() &#123;
            this.isDragging = false;
        &#125;
        
        onKeyDown(event) &#123;
            switch(event.key) &#123;
                case &#39; &#39;:
                    this.cameraDistance = 50;
                    this.cameraRotation = &#123; x: 0, y: 0 &#125;;
                    this.updateCameraPosition();
                    break;
                case &#39;r&#39;:
                case &#39;R&#39;:
                    this.isRotating = !this.isRotating;
                    document.getElementById(&#39;toggle-rotation&#39;).textContent = 
                        this.isRotating ? &#39;暂停旋转&#39; : &#39;继续旋转&#39;;
                    break;
                case &#39;f&#39;:
                case &#39;F&#39;:
                    if (!document.fullscreenElement) &#123;
                        document.documentElement.requestFullscreen();
                    &#125; else &#123;
                        document.exitFullscreen();
                    &#125;
                    break;
            &#125;
        &#125;
        
        updateCameraPosition() &#123;
            this.camera.position.x = this.cameraDistance * Math.sin(this.cameraRotation.y) * Math.cos(this.cameraRotation.x);
            this.camera.position.y = this.cameraDistance * Math.sin(this.cameraRotation.x);
            this.camera.position.z = this.cameraDistance * Math.cos(this.cameraRotation.y) * Math.cos(this.cameraRotation.x);
            this.camera.lookAt(0, 0, 0);
        &#125;
        
        onWindowResize() &#123;
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth, window.innerHeight);
        &#125;
        
        hideLoading() &#123;
            setTimeout(() =&gt; &#123;
                const loading = document.getElementById(&#39;loading&#39;);
                if (loading) &#123;
                    loading.style.transition = &#39;opacity 1s ease&#39;;
                    loading.style.opacity = &#39;0&#39;;
                    setTimeout(() =&gt; &#123;
                        loading.style.display = &#39;none&#39;;
                    &#125;, 1000);
                &#125;
            &#125;, 1000);
        &#125;
        
        showError(message) &#123;
            const loading = document.getElementById(&#39;loading&#39;);
            if (loading) &#123;
                loading.innerHTML = `
                    &lt;div style=&quot;color: #ff6b6b; font-size: 24px; margin-bottom: 20px;&quot;&gt;⚠️&lt;/div&gt;
                    &lt;p style=&quot;color: #ff6b6b; font-size: 16px;&quot;&gt;$&#123;message&#125;&lt;/p&gt;
                    &lt;button onclick=&quot;location.reload()&quot; style=&quot;margin-top: 20px; padding: 10px 30px; background: rgba(255,100,100,0.2); border: 1px solid rgba(255,100,100,0.5); color: white; border-radius: 8px; cursor: pointer; font-size: 16px;&quot;&gt;
                        重新加载
                    &lt;/button&gt;
                `;
            &#125;
        &#125;
        
        animate() &#123;
            requestAnimationFrame(() =&gt; this.animate());
            
            if (this.particles &amp;&amp; this.isRotating) &#123;
                this.particles.rotation.y += this.rotationSpeed;
                this.particles.rotation.x += this.rotationSpeed * 0.5;
            &#125;
            
            this.renderer.render(this.scene, this.camera);
        &#125;
    &#125;
    
    // 初始化
    window.addEventListener(&#39;load&#39;, () =&gt; &#123;
        // 检查Three.js是否加载
        if (typeof THREE === &#39;undefined&#39;) &#123;
            document.getElementById(&#39;loading&#39;).innerHTML = `
                &lt;div style=&quot;color: #ff6b6b; font-size: 24px; margin-bottom: 20px;&quot;&gt;⚠️&lt;/div&gt;
                &lt;p style=&quot;color: #ff6b6b; font-size: 16px;&quot;&gt;无法加载Three.js库&lt;/p&gt;
                &lt;p style=&quot;color: #888; font-size: 12px; margin-top: 10px;&quot;&gt;请检查网络连接&lt;/p&gt;
                &lt;button onclick=&quot;location.reload()&quot; style=&quot;margin-top: 20px; padding: 10px 30px; background: rgba(255,100,100,0.2); border: 1px solid rgba(255,100,100,0.5); color: white; border-radius: 8px; cursor: pointer; font-size: 16px;&quot;&gt;
                    重新加载
                &lt;/button&gt;
            `;
            return;
        &#125;
        
        // 初始化粒子系统
        try &#123;
            window.particleSystem = new GoldenParticleSystem();
            console.log(&#39;3D粒子系统初始化成功&#39;);
        &#125; catch (error) &#123;
            console.error(&#39;初始化失败:&#39;, error);
            document.getElementById(&#39;loading&#39;).innerHTML = `
                &lt;div style=&quot;color: #ff6b6b; font-size: 24px; margin-bottom: 20px;&quot;&gt;⚠️&lt;/div&gt;
                &lt;p style=&quot;color: #ff6b6b; font-size: 16px;&quot;&gt;初始化失败: $&#123;error.message&#125;&lt;/p&gt;
