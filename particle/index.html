    <!-- 引入Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // 手势控制器类
        class GestureController {
            constructor(particleSystem) {
                this.particleSystem = particleSystem;
                this.video = document.getElementById('gesture-video');
                this.canvas = document.getElementById('gesture-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.hands = null;
                this.camera = null;
                this.isRunning = false;
                this.handPositions = []; // 存储手部关键点
            }
            
            async init() {
                try {
                    // 检查MediaPipe是否加载
                    if (typeof Hands === 'undefined') {
                        throw new Error('MediaPipe Hands库未加载');
                    }
                    
                    // 初始化手部追踪
                    this.hands = new Hands({
                        locateFile: (file) => {
                            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`;
                        }
                    });
                    
                    this.hands.setOptions({
                        maxNumHands: 2,
                        minDetectionConfidence: 0.5,
                        minTrackingConfidence: 0.5
                    });
                    
                    this.hands.onResults((results) => this.onResults(results));
                    
                    // 初始化摄像头
                    this.camera = new Camera(this.video, {
                        onFrame: async () => {
                            if (this.isRunning) {
                                await this.hands.send({ image: this.video });
                            }
                        },
                        width: 640,
                        height: 480
                    });
                    
                    console.log('手势控制器初始化成功');
                    return true;
                } catch (error) {
                    console.error('手势控制器初始化失败:', error);
                    this.showError(error.message);
                    return false;
                }
            }
            
            async start() {
                if (this.isRunning) return;
                
                try {
                    // 显示视频和画布
                    this.video.style.display = 'block';
                    this.canvas.style.display = 'block';
                    
                    // 调整画布大小
                    this.canvas.width = 200;
                    this.canvas.height = 150;
                    
                    // 启动摄像头
                    await this.camera.start();
                    this.isRunning = true;
                    
                    // 更新按钮状态
                    const button = document.getElementById('toggle-gesture');
                    if (button) {
                        button.textContent = '关闭手势';
                        button.classList.add('active');
                    }
                    
                    console.log('手势感应已启动');
                } catch (error) {
                    console.error('启动手势感应失败:', error);
                    this.showError('无法访问摄像头: ' + error.message);
                }
            }
            
            stop() {
                if (!this.isRunning) return;
                
                this.isRunning = false;
                
                // 停止摄像头
                if (this.camera) {
                    this.camera.stop();
                }
                
                // 隐藏视频和画布
                this.video.style.display = 'none';
                this.canvas.style.display = 'none';
                
                // 清除画布
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 更新按钮状态
                const button = document.getElementById('toggle-gesture');
                if (button) {
                    button.textContent = '手势感应';
                    button.classList.remove('active');
                }
                
                console.log('手势感应已关闭');
            }
            
            toggle() {
                if (this.isRunning) {
                    this.stop();
                } else {
                    this.start();
                }
            }
            
            onResults(results) {
                // 清除画布
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制手部关键点
                if (results.multiHandLandmarks) {
                    for (const landmarks of results.multiHandLandmarks) {
                        // 绘制连接线
                        drawConnectors(this.ctx, landmarks, HAND_CONNECTIONS, {
                            color: '#00FF00',
                            lineWidth: 2
                        });
                        
                        // 绘制关键点
                        drawLandmarks(this.ctx, landmarks, {
                            color: '#FF0000',
                            lineWidth: 1,
                            radius: 3
                        });
                        
                        // 存储手部位置用于控制粒子
                        this.handPositions.push(landmarks);
                    }
                }
                
                // 使用手部位置控制粒子
                this.controlParticles();
            }
            
            controlParticles() {
                if (!this.particleSystem || !this.handPositions.length) return;
                
                // 计算手部平均位置
                let avgX = 0, avgY = 0, avgZ = 0;
                let count = 0;
                
                for (const hand of this.handPositions) {
                    for (const landmark of hand) {
                        avgX += landmark.x;
                        avgY += landmark.y;
                        avgZ += landmark.z;
                        count++;
                    }
                }
                
                if (count > 0) {
                    avgX /= count;
                    avgY /= count;
                    avgZ /= count;
                    
                    // 将手部位置映射到粒子旋转
                    // 手部X坐标控制左右旋转，Y坐标控制上下旋转
                    this.particleSystem.cameraRotation.y = (avgX - 0.5) * Math.PI * 2;
                    this.particleSystem.cameraRotation.x = (avgY - 0.5) * Math.PI;
                    
                    // 更新相机位置
                    this.particleSystem.updateCameraPosition();
                    
                    // 清空手部位置数组（用于下一帧）
                    this.handPositions = [];
                }
            }
            
            showError(message) {
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.innerHTML = `
                        <div style="color: #ff6b6b; font-size: 24px; margin-bottom: 20px;">⚠️</div>
                        <p style="color: #ff6b6b; font-size: 16px;">手势感应错误: ${message}</p>
                        <p style="color: #888; font-size: 12px; margin-top: 10px;">请确保允许摄像头权限</p>
                        <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 30px; background: rgba(255,100,100,0.2); border: 1px solid rgba(255,100,100,0.5); color: white; border-radius: 8px; cursor: pointer; font-size: 16px;">
                            重新加载
                        </button>
                    `;
                }
            }
        }
        
        // 粒子系统类
        class GoldenParticleSystem {
            constructor() {
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.particles = null;
                this.particleCount = 50000;
                this.rotationSpeed = 0.001;
                this.isRotating = true;
                this.clock = new THREE.Clock();
                
                this.mouse = new THREE.Vector2();
                this.raycaster = new THREE.Raycaster();
                this.isDragging = false;
                this.previousMousePosition = { x: 0, y: 0 };
                
                this.cameraDistance = 50;
                this.cameraRotation = { x: 0, y: 0 };
                
                this.gestureController = null;
                
                this.init();
            }
            
            init() {
                try {
                    // 场景
                    this.scene = new THREE.Scene();
                    this.scene.background = new THREE.Color(0x000000);
                    
                    // 相机
                    this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                    this.camera.position.z = this.cameraDistance;
                    
                    // 渲染器
                    this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                    document.getElementById('canvas-container').appendChild(this.renderer.domElement);
                    
                    // 灯光
                    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
                    this.scene.add(ambientLight);
                    
                    const pointLight1 = new THREE.PointLight(0xFFD700, 1, 100);
                    pointLight1.position.set(50, 50, 50);
                    this.scene.add(pointLight1);
                    
                    const pointLight2 = new THREE.PointLight(0xFF8C00, 1, 100);
                    pointLight2.position.set(-50, -50, 50);
                    this.scene.add(pointLight2);
                    
                    // 创建粒子
                    this.createParticles();
                    
                    // 事件监听
                    this.setupEventListeners();
                    
                    // 控制面板
                    this.setupControls();
                    
                    // 初始化手势控制器
                    this.gestureController = new GestureController(this);
                    
                    // 隐藏加载状态
                    this.hideLoading();
                    
                    // 开始动画
                    this.animate();
                    
                    console.log('3D粒子系统初始化成功');
                    
                } catch (error) {
                    console.error('初始化失败:', error);
                    this.showError('初始化失败: ' + error.message);
                }
            }
            
            createParticles() {
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(this.particleCount * 3);
                const colors = new Float32Array(this.particleCount * 3);
                
                for (let i = 0; i < this.particleCount; i++) {
                    const i3 = i * 3;
                    
                    // 球形分布
                    const radius = 20 + Math.random() * 30;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    
                    positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                    positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                    positions[i3 + 2] = radius * Math.cos(phi);
                    
                    // 金色到橙色渐变
                    const hue = 0.1 + Math.random() * 0.1;
                    const saturation = 0.8;
                    const lightness = 0.5 + Math.random() * 0.3;
                    
                    const color = new THREE.Color();
                    color.setHSL(hue, saturation, lightness);
                    colors[i3] = color.r;
                    colors[i3 + 1] = color.g;
                    colors[i3 + 2] = color.b;
                }
                
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                
                // 创建粒子纹理
                const canvas = document.createElement('canvas');
                canvas.width = 64;
                canvas.height = 64;
                const ctx = canvas.getContext('2d');
                
                const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
                gradient.addColorStop(0.3, 'rgba(255, 200, 100, 0.8)');
                gradient.addColorStop(0.7, 'rgba(255, 150, 50, 0.3)');
                gradient.addColorStop(1, 'rgba(255, 100, 0, 0)');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 64, 64);
                
                const texture = new THREE.CanvasTexture(canvas);
                
                const material = new THREE.PointsMaterial({
                    size: 2,
                    map: texture,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                    transparent: true,
                    vertexColors: true
                });
                
                this.particles = new THREE.Points(geometry, material);
                this.scene.add(this.particles);
            }
            
            setupEventListeners() {
                // 鼠标控制
                this.renderer.domElement.addEventListener('mousedown', (e) => this.onMouseDown(e));
                this.renderer.domElement.addEventListener('mousemove', (e) => this.onMouseMove(e));
                this.renderer.domElement.addEventListener('mouseup', () => this.onMouseUp());
                this.renderer.domElement.addEventListener('wheel', (e) => this.onMouseWheel(e));
                this.renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());
                
                // 触摸控制
                this.renderer.domElement.addEventListener('touchstart', (e) => this.onTouchStart(e));
                this.renderer.domElement.addEventListener('touchmove', (e) => this.onTouchMove(e));
                this.renderer.domElement.addEventListener('touchend', () => this.onTouchEnd());
                
                // 窗口大小改变
                window.addEventListener('resize', () => this.onWindowResize());
                
                // 键盘控制
                window.addEventListener('keydown', (e) => this.onKeyDown(e));
            }
            
            setupControls() {
                // 粒子数量
                document.getElementById('particle-count').addEventListener('input', (e) => {
                    this.particleCount = parseInt(e.target.value);
                    e.target.previousElementSibling.textContent = `粒子数量: ${this.particleCount}`;
                    this.recreateParticles();
                });
                
                // 粒子大小
                document.getElementById('particle-size').addEventListener('input', (e) => {
                    const size = parseFloat(e.target.value);
                    e.target.previousElementSibling.textContent = `粒子大小: ${size.toFixed(1)}`;
                    if (this.particles) {
                        this.particles.material.size = size;
                    }
                });
                
                // 旋转速度
                document.getElementById('rotation-speed').addEventListener('input', (e) => {
                    this.rotationSpeed = parseFloat(e.target.value) * 0.002;
                    e.target.previousElementSibling.textContent = `旋转速度: ${parseFloat(e.target.value).toFixed(1)}`;
                });
                
                // 泛光强度
                document.getElementById('bloom-intensity').addEventListener('input', (e) => {
                    const intensity = parseFloat(e.target.value);
                    e.target.previousElementSibling.textContent = `泛光强度: ${intensity.toFixed(1)}`;
                });
                
                // 重置视角
                document.getElementById('reset-view').addEventListener('click', () => {
                    this.cameraDistance = 50;
                    this.cameraRotation = { x: 0, y: 0 };
                    this.updateCameraPosition();
                });
                
                // 暂停/继续旋转
                document.getElementById('toggle-rotation').addEventListener('click', (e) => {
                    this.isRotating = !this.isRotating;
                    e.target.textContent = this.isRotating ? '暂停旋转' : '继续旋转';
                });
                
                // 全屏
                document.getElementById('fullscreen').addEventListener('click', () => {
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen();
                    } else {
                        document.exitFullscreen();
                    }
                });
                
                // 手势感应
                document.getElementById('toggle-gesture').addEventListener('click', async () => {
                    if (!this.gestureController) {
                        this.gestureController = new GestureController(this);
                    }
                    
                    if (!this.gestureController.isRunning) {
                        // 初始化手势控制器
                        const success = await this.gestureController.init();
                        if (success) {
                            await this.gestureController.start();
                        }
                    } else {
                        this.gestureController.stop();
                    }
                });
            }
            
            recreateParticles() {
                if (this.particles) {
                    this.scene.remove(this.particles);
                    this.particles.geometry.dispose();
                    this.particles.material.dispose();
                }
                this.createParticles();
            }
            
            onMouseDown(event) {
                if (event.button === 0) {
                    this.isDragging = true;
                    this.previousMousePosition = { x: event.clientX, y: event.clientY };
                }
            }
            
            onMouseMove(event) {
                if (!this.isDragging) return;
                
                const deltaX = event.clientX - this.previousMousePosition.x;
                const deltaY = event.clientY - this.previousMousePosition.y;
                
                this.cameraRotation.y += deltaX * 0.005;
                this.cameraRotation.x += deltaY * 0.005;
                
                this.updateCameraPosition();
                
                this.previousMousePosition = { x: event.clientX, y: event.clientY };
            }
            
            onMouseUp() {
                this.isDragging = false;
            }
            
            onMouseWheel(event) {
                event.preventDefault();
                this.cameraDistance += event.deltaY * 0.05;
                this.cameraDistance = Math.max(10, Math.min(200, this.cameraDistance));
                this.updateCameraPosition();
            }
            
            onTouchStart(event) {
                if (event.touches.length === 1) {
                    this.isDragging = true;
                    this.previousMousePosition = { 
                        x: event.touches[0].clientX, 
                        y: event.touches[0].clientY 
                    };
                }
            }
            
            onTouchMove(event) {
                if (!this.isDragging || event.touches.length !== 1) return;
                event.preventDefault();
                
                const deltaX = event.touches[0].clientX - this.previousMousePosition.x;
                const deltaY = event.touches[0].clientY - this.previousMousePosition.y;
                
                this.cameraRotation.y += deltaX * 0.005;
                this.cameraRotation.x += deltaY * 0.005;
                
                this.updateCameraPosition();
                
                this.previousMousePosition = { 
                    x: event.touches[0].clientX, 
                    y: event.touches[0].clientY 
                };
            }
            
            onTouchEnd() {
                this.isDragging = false;
            }
            
            onKeyDown(event) {
                switch(event.key) {
                    case ' ':
                        this.cameraDistance = 50;
                        this.cameraRotation = { x: 0, y: 0 };
                        this.updateCameraPosition();
                        break;
                    case 'r':
                    case 'R':
                        this.isRotating = !this.isRotating;
                        document.getElementById('toggle-rotation').textContent = 
                            this.isRotating ? '暂停旋转' : '继续旋转';
                        break;
                    case 'f':
                    case 'F':
                        if (!document.fullscreenElement) {
                            document.documentElement.requestFullscreen();
                        } else {
                            document.exitFullscreen();
                        }
                        break;
                }
            }
            
            updateCameraPosition() {
                this.camera.position.x = this.cameraDistance * Math.sin(this.cameraRotation.y) * Math.cos(this.cameraRotation.x);
                this.camera.position.y = this.cameraDistance * Math.sin(this.cameraRotation.x);
                this.camera.position.z = this.cameraDistance * Math.cos(this.cameraRotation.y) * Math.cos(this.cameraRotation.x);
                this.camera.lookAt(0, 0, 0);
            }
            
            onWindowResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }
            
            hideLoading() {
                setTimeout(() => {
                    const loading = document.getElementById('loading');
                    if (loading) {
                        loading.style.transition = 'opacity 1s ease';
                        loading.style.opacity = '0';
                        setTimeout(() => {
                            loading.style.display = 'none';
                        }, 1000);
                    }
                }, 1000);
            }
            
            showError(message) {
                const loading = document.getElementById('loading');
                if (loading) {
                    loading.innerHTML = `
                        <div style="color: #ff6b6b; font-size: 24px; margin-bottom: 20px;">⚠️</div>
                        <p style="color: #ff6b6b; font-size: 16px;">${message}</p>
                        <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 30px; background: rgba(255,100,100,0.2); border: 1px solid rgba(255,100,100,0.5); color: white; border-radius: 8px; cursor: pointer; font-size: 16px;">
                            重新加载
                        </button>
                    `;
                }
            }
            
            animate() {
                requestAnimationFrame(() => this.animate());
                
                if (this.particles && this.isRotating) {
                    this.particles.rotation.y += this.rotationSpeed;
                    this.particles.rotation.x += this.rotationSpeed * 0.5;
                }
                
                this.renderer.render(this.scene, this.camera);
            }
        }
        
        // 初始化
        window.addEventListener('load', () => {
            // 检查Three.js是否加载
            if (typeof THREE === 'undefined') {
                document.getElementById('loading').innerHTML = `
                    <div style="color: #ff6b6b; font-size: 24px; margin-bottom: 20px;">⚠️</div>
                    <p style="color: #ff6b6b; font-size: 16px;">无法加载Three.js库</p>
                    <p style="color: #888; font-size: 12px; margin-top: 10px;">请检查网络连接</p>
                    <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 30px; background: rgba(255,100,100,0.2); border: 1px solid rgba(255,100,100,0.5); color: white; border-radius: 8px; cursor: pointer; font-size: 16px;">
                        重新加载
                    </button>
                `;
                return;
            }
            
            // 初始化粒子系统
            try {
                window.particleSystem = new GoldenParticleSystem();
            } catch (error) {
                console.error('初始化失败:', error);
                document.getElementById('loading').innerHTML = `
                    <div style="color: #ff6b6b; font-size: 24px; margin-bottom: 20px;">⚠️</div>
                    <p style="color: #ff6b6b; font-size: 16px;">初始化失败: ${error.message}</p>
                    <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 30px; background: rgba(255,100,100,0.2); border: 1px solid rgba(255,100,100,0.5); color: white; border-radius: 8px; cursor: pointer; font-size: 16px;">
                        重新加载
                    </button>
                `;
            }
        });
    </script>
    
    <!-- MediaPipe Hands for gesture recognition -->

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
