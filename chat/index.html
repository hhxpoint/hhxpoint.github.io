<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// 全局变量
let messages = [];
let isTyping = false;
let apiKey = '';
let model = 'qwen-plus';
let systemPrompt = '你是一个有帮助的AI助手，请用中文回答问题。';

// API 配置
const API_URL = 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions';

// 初始化
document.addEventListener('DOMContentLoaded', function() {
  loadSettings();
  setupEventListeners();
  marked.setOptions({
    highlight: function(code, lang) {
      return code;
    },
    breaks: true,
    gfm: true
  });
});

// 加载设置
function loadSettings() {
  apiKey = localStorage.getItem('dashscope_api_key') || '';
  model = localStorage.getItem('dashscope_model') || 'qwen-plus';
  systemPrompt = localStorage.getItem('dashscope_system_prompt') || '你是一个有帮助的AI助手，请用中文回答问题。';
  
  document.getElementById('apiKey').value = apiKey;
  document.getElementById('modelSelect').value = model;
  document.getElementById('systemPrompt').value = systemPrompt;
  
  // 初始化消息数组
  messages = [
    { role: 'system', content: systemPrompt }
  ];
}

// 保存设置
function saveApiKey() {
  apiKey = document.getElementById('apiKey').value.trim();
  model = document.getElementById('modelSelect').value;
  systemPrompt = document.getElementById('systemPrompt').value.trim();
  
  localStorage.setItem('dashscope_api_key', apiKey);
  localStorage.setItem('dashscope_model', model);
  localStorage.setItem('dashscope_system_prompt', systemPrompt);
  
  // 更新系统提示
  messages[0] = { role: 'system', content: systemPrompt };
  
  showNotification('设置已保存');
  toggleSettings();
}

// 显示通知
function showNotification(message) {
  const notification = document.createElement('div');
  notification.textContent = message;
  notification.style.cssText = `
    position: fixed;
    top: 20px;
    right: 20px;
    background: linear-gradient(135deg, #c678dd, #a85fbb);
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    z-index: 10000;
    animation: fadeInUp 0.3s ease-out;
  `;
  document.body.appendChild(notification);
  
  setTimeout(() => {
    notification.style.animation = 'fadeInUp 0.3s ease-out reverse';
    setTimeout(() => notification.remove(), 300);
  }, 2000);
}

// 切换设置面板
function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  panel.classList.toggle('hidden');
}

// 设置事件监听器
function setupEventListeners() {
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  
  // 回车发送消息
  userInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  
  // 自动调整输入框高度
  userInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
}

// 发送消息
async function sendMessage() {
  const userInput = document.getElementById('userInput');
  const message = userInput.value.trim();
  
  if (!message || isTyping) return;
  
  if (!apiKey) {
    showNotification('请先设置 API Key');
    toggleSettings();
    return;
  }
  
  // 添加用户消息
  addMessage('user', message);
  messages.push({ role: 'user', content: message });
  
  // 清空输入框
  userInput.value = '';
  userInput.style.height = 'auto';
  
  // 显示正在输入
  isTyping = true;
  showTypingIndicator();
  
  try {
    // 调用 API
    await callDashScopeAPI();
  } catch (error) {
    console.error('API 调用失败:', error);
    addMessage('assistant', `抱歉，发生了错误：${error.message}`);
  } finally {
    isTyping = false;
    hideTypingIndicator();
  }
}

// 调用通义千问 API
async function callDashScopeAPI() {
  const response = await fetch(API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: model,
      messages: messages,
      stream: true,
      stream_options: { include_usage: false }
    })
  });
  
  if (!response.ok) {
    const errorData = await response.json().catch(() => ({}));
    throw new Error(errorData.error?.message || `HTTP ${response.status}: ${response.statusText}`);
  }
  
  // 处理流式响应
  await handleStreamResponse(response);
}

// 处理流式响应
async function handleStreamResponse(response) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let assistantMessage = '';
  let messageElement = null;
  
  while (true) {
    const { done, value } = await reader.read();
    
    if (done) break;
    
    const chunk = decoder.decode(value, { stream: true });
    const lines = chunk.split('\n');
    
    for (const line of lines) {
      if (line.startsWith('data: ')) {
        const data = line.slice(6);
        
        if (data === '[DONE]') {
          break;
        }
        
        try {
          const parsed = JSON.parse(data);
          const content = parsed.choices?.[0]?.delta?.content || '';
          
          if (content) {
            assistantMessage += content;
            
            if (!messageElement) {
              messageElement = addMessage('assistant', '');
            }
            
            // 使用 marked 渲染 Markdown
            messageElement.querySelector('.message-content').innerHTML = marked.parse(assistantMessage);
            
            // 滚动到底部
            scrollToBottom();
          }
        } catch (e) {
          // 忽略解析错误
        }
      }
    }
  }
  
  // 保存助手消息
  if (assistantMessage) {
    messages.push({ role: 'assistant', content: assistantMessage });
  }
}

// 添加消息到界面
function addMessage(role, content) {
  const chatMessages = document.getElementById('chatMessages');
  const messageDiv = document.createElement('div');
  messageDiv.className = `message ${role}`;
  
  const contentDiv = document.createElement('div');
  contentDiv.className = 'message-content';
  
  if (role === 'assistant' && content) {
    // 使用 marked 渲染 Markdown
    contentDiv.innerHTML = marked.parse(content);
  } else {
    contentDiv.innerHTML = `<p>${escapeHtml(content)}</p>`;
  }
  
  messageDiv.appendChild(contentDiv);
  chatMessages.appendChild(messageDiv);
  
  scrollToBottom();
  return messageDiv;
}

// 显示正在输入指示器
function showTypingIndicator() {
  const chatMessages = document.getElementById('chatMessages');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'message assistant';
  typingDiv.id = 'typingIndicator';
  
  typingDiv.innerHTML = `
    <div class="message-content">
      <div class="typing-indicator">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  `;
  
  chatMessages.appendChild(typingDiv);
  scrollToBottom();
}

// 隐藏正在输入指示器
function hideTypingIndicator() {
  const typingIndicator = document.getElementById('typingIndicator');
  if (typingIndicator) {
    typingIndicator.remove();
  }
}

// 清空对话
function clearChat() {
  const chatMessages = document.getElementById('chatMessages');
  chatMessages.innerHTML = `
    <div class="message system">
      <div class="message-content">
        <p>你好！我是基于通义千问的AI助手。我可以回答问题、创作文字、进行逻辑推理、编程等。有什么我可以帮你的吗？</p>
      </div>
    </div>
  `;
  
  messages = [
    { role: 'system', content: systemPrompt }
  ];
  
  showNotification('对话已清空');
}

// 滚动到底部
function scrollToBottom() {
  const chatMessages = document.getElementById('chatMessages');
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// 转义 HTML
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
