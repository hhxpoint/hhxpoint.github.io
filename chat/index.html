// 全局变量
let messages = [{ role: 'system', content: SYSTEM_PROMPT }];
let isTyping = false;

// 初始化
document.addEventListener('DOMContentLoaded', function() {
  setupEventListeners();
  marked.setOptions({
    breaks: true,
    gfm: true
  });
});

// 设置事件监听
function setupEventListeners() {
  const userInput = document.getElementById('userInput');
  
  userInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  
  userInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

// 发送消息
async function sendMessage() {
  const userInput = document.getElementById('userInput');
  const message = userInput.value.trim();
  
  if (!message || isTyping) return;
  
  addMessage('user', message);
  messages.push({ role: 'user', content: message });
  
  userInput.value = '';
  userInput.style.height = 'auto';
  
  isTyping = true;
  showTypingIndicator();
  
  try {
    await callAPI();
  } catch (error) {
    console.error('API Error:', error);
    addMessage('assistant', '抱歉，发生了错误。请稍后再试。');
  } finally {
    isTyping = false;
    hideTypingIndicator();
  }
}

// 调用 API
async function callAPI() {
  const response = await fetch(API_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${API_KEY}`
    },
    body: JSON.stringify({
      model: MODEL,
      messages: messages,
      stream: true
    })
  });

    throw new Error(`HTTP ${response.status}`);

}

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let content = '';
  let element = null;
  
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    
    const chunk = decoder.decode(value, { stream: true });
    const lines = chunk.split('\n');
    
    for (const line of lines) {
      if (line.startsWith('data: ')) {
        const data = line.slice(6);

        try {
          const parsed = JSON.parse(data);
          const text = parsed.choices?.[0]?.delta?.content || '';
          
          if (text) {
            content += text;
            if (!element) {
              element = addMessage('assistant', '');
            }
            element.querySelector('.message-content').innerHTML = marked.parse(content);
            scrollToBottom();
          }
        } catch (e) {}
      }
    }
  }
  
  if (content) {
    messages.push({ role: 'assistant', content: content });
  }
}

// 添加消息
function addMessage(role, content) {
  const chatMessages = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  
  const avatar = document.createElement('div');
  avatar.className = 'message-avatar';
  avatar.textContent = role === 'user' ? '👤' : '✨';
  
  const contentDiv = document.createElement('div');
  contentDiv.className = 'message-content';
  
  if (role === 'assistant' && content) {
    contentDiv.innerHTML = marked.parse(content);
  } else {
    contentDiv.innerHTML = `<p>${escapeHtml(content)}</p>`;
  }
  
  div.appendChild(avatar);
  div.appendChild(contentDiv);
  chatMessages.appendChild(div);
  
  scrollToBottom();
  return div;
}

// 显示正在输入
function showTypingIndicator() {
  const chatMessages = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="message-avatar">✨</div>
    <div class="message-content">
      <div class="typing-indicator">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  `;
  chatMessages.appendChild(div);
  scrollToBottom();
}

// 隐藏正在输入
function hideTypingIndicator() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

// 清空对话
function clearChat() {
  const chatMessages = document.getElementById('chatMessages');
  chatMessages.innerHTML = `
    <div class="message assistant">
      <div class="message-avatar">✨</div>
      <div class="message-content">
        <p>你好！我是 point_xuan AI，很高兴见到你！</p>
        <p>我可以帮你回答问题、创作文字、编写代码、逻辑推理等。有什么我可以帮你的吗？</p>
      </div>
    </div>
  `;
  messages = [{ role: 'system', content: SYSTEM_PROMPT }];
}

// 滚动到底部
function scrollToBottom() {
  const chatMessages = document.getElementById('chatMessages');
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// 转义 HTML
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}
